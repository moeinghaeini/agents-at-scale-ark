apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.app.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.app.name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.app.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Values.app.name }}
        image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.app.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.app.config.port }}
          protocol: TCP
        env:
        - name: NODE_ENV
          value: {{ .Values.app.config.nodeEnv }}
        - name: PORT
          value: {{ .Values.app.config.port | quote }}
        - name: HOSTNAME
          value: {{ .Values.app.config.hostname }}
        resources:
          {{- toYaml .Values.app.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.app.securityContext | nindent 10 }}
