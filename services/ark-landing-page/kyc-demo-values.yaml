# KYC Demo configuration for ark-api (read-only mode enabled, cluster-wide read access)
app:
  env:
    - name: READ_ONLY_MODE
      value: "true"
    - name: AUTH_MODE
      value: "open"
    - name: CORS_ORIGINS
      value: "*"

# Enable cluster-wide read permissions to access resources from all namespaces
rbac:
  clusterWide: true
