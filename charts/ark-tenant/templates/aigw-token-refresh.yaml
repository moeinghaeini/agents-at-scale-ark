{{- if .Values.aigwTokenRefresh.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.aigwTokenRefresh.saCredentialsSecret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ark-tenant.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-id: {{ required "aigwTokenRefresh.clientId is required" .Values.aigwTokenRefresh.clientId | quote }}
  client-secret: {{ required "aigwTokenRefresh.clientSecret is required" .Values.aigwTokenRefresh.clientSecret | quote }}
  instance-id: {{ required "aigwTokenRefresh.instanceId is required" .Values.aigwTokenRefresh.instanceId | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.aigwTokenRefresh.aigwSecret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ark-tenant.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: "{{ .Values.aigwTokenRefresh.clientId }}:{{ .Values.aigwTokenRefresh.clientSecret }}"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: aigw-token-refresh
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ark-tenant.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.aigwTokenRefresh.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ include "ark-tenant.serviceAccountName" . }}
          restartPolicy: OnFailure
          containers:
            - name: refresh
              image: {{ .Values.aigwTokenRefresh.image }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  CLIENT_ID=$(cat /etc/aigw/client-id)
                  CLIENT_SECRET=$(cat /etc/aigw/client-secret)
                  INSTANCE_ID=$(cat /etc/aigw/instance-id)

                  RESPONSE=$(curl -sf \
                    -H "Authorization: Bearer ${CLIENT_ID}:${CLIENT_SECRET}" \
                    -H "X-Instance-Id: ${INSTANCE_ID}" \
                    "{{ .Values.aigwTokenRefresh.saEndpoint }}")

                  NEW_ID=$(echo "$RESPONSE" | sed -n 's/.*"client_id":"\([^"]*\)".*/\1/p')
                  NEW_SECRET=$(echo "$RESPONSE" | sed -n 's/.*"client_secret":"\([^"]*\)".*/\1/p')

                  if [ -z "$NEW_ID" ] || [ -z "$NEW_SECRET" ]; then
                    echo "ERROR: failed to fetch credentials"
                    exit 1
                  fi

                  kubectl create secret generic {{ .Values.aigwTokenRefresh.aigwSecret }} \
                    --from-literal=api-key="${NEW_ID}:${NEW_SECRET}" \
                    --dry-run=client -o yaml | kubectl apply -f -

                  if [ "$NEW_ID" != "$CLIENT_ID" ] || [ "$NEW_SECRET" != "$CLIENT_SECRET" ]; then
                    kubectl create secret generic {{ .Values.aigwTokenRefresh.saCredentialsSecret }} \
                      --from-literal=client-id="$NEW_ID" \
                      --from-literal=client-secret="$NEW_SECRET" \
                      --from-literal=instance-id="$INSTANCE_ID" \
                      --dry-run=client -o yaml | kubectl apply -f -
                  fi
              volumeMounts:
                - name: aigw
                  mountPath: /etc/aigw
                  readOnly: true
          volumes:
            - name: aigw
              secret:
                secretName: {{ .Values.aigwTokenRefresh.saCredentialsSecret }}
{{- end }}
