apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: a2a-message-query
spec:
  description: Test querying mock-llm echo A2A agent and verifying message echo
  steps:
  - name: step-1
    try:
    # Install mock-llm with A2A agents enabled
    - script:
        content: |
          helm install mock-llm oci://ghcr.io/dwmkerr/charts/mock-llm \
            --version 0.1.28 \
            --namespace $NAMESPACE \
            --values mock-llm-values.yaml
        env:
        - name: NAMESPACE
          value: ($namespace)
    # Wait for echo A2AServer to be Ready
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1prealpha1
          kind: A2AServer
          metadata:
            name: mock-llm-echo
          status:
            (contains(conditions[?type == 'Ready'].status || `[]`, 'True')): true
    # Apply Query targeting echo agent
    - apply:
        file: manifests/a01-query.yaml
    # Wait for Query to complete
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: echo-test-query
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    # Verify response contains the echoed message
    - assert:
        timeout: 1s
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: echo-test-query
          status:
            (response != null): true
            (response.target.name): 'echo-agent'
            (contains(response.content, 'Hello from A2A echo agent!')): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1prealpha1
        kind: A2AServer
        name: mock-llm-echo
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: echo-test-query

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
