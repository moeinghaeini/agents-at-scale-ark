apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: evaluation-direct
  labels:
    evaluated: "true"
spec:
  description: Test direct evaluation functionality with input/output pairs
  steps:
  - name: step-1
    try:
    - script:
        skipLogOutput: true
        content: |
          set -u
          echo "{\"token\": \"$E2E_TEST_AZURE_OPENAI_KEY\", \"url\": \"$E2E_TEST_AZURE_OPENAI_BASE_URL\"}"
        outputs:
        - name: azure
          value: (json_parse($stdout))
    - script:
        content: |
          helm install ark-tenant ../../charts/ark-tenant --namespace $NAMESPACE --create-namespace --wait
        env:
        - name: NAMESPACE
          value: ($namespace)
    - script:
        content: bash ../helpers/wait-for-evaluator.sh
    - apply:
        file: manifests/a0[0-4]-*.yaml
    - assert:
        resource:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: evaluator-llm-test-access
        timeout: 15s
    - script:
        content: bash ../helpers/wait-for-rbac.sh evaluator-llm-test-access $NAMESPACE
        env:
        - name: NAMESPACE
          value: ($namespace)
        timeout: 30s
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: direct-evaluation-model
        timeout: 3m
        for:
          condition:
            name: ModelAvailable
            value: 'True'
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Evaluator
        timeout: 3m
        name: test-evaluator-llm
        for:
          jsonPath:
            path: '{.status.phase}'
            value: 'ready'
    - assert:
        resource:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: golden-examples
    - apply:
        file: manifests/a05-evaluation.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Evaluation
        timeout: 10m
        name: test-direct-evaluation
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Evaluation
          metadata:
            name: test-direct-evaluation
          status:
            phase: done
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Evaluation
          metadata:
            name: test-direct-evaluation
          status:
            (conditions[?type == 'Completed']):
            - status: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Evaluation
          metadata:
            name: test-direct-evaluation
          status:
            (type(score) == 'string'): true
            (to_number(score) >= `0.0` && to_number(score) <= `1.0`): true
            (type(passed) == 'boolean'): true
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Evaluation
          metadata:
            name: test-direct-evaluation
            (contains(keys(annotations), 'evaluation.metadata/reasoning')): true
            (contains(keys(annotations), 'evaluation.metadata/criteria_scores')): true
            (contains(keys(annotations), 'evaluation.metadata/evaluation_scope')): true
            (contains(keys(annotations), 'evaluation.metadata/min_score_threshold')): true
            (contains(keys(annotations), 'evaluation.metadata/model_used')): true
            (contains(keys(annotations), 'evaluation.metadata/query_id')): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Evaluation
        name: test-direct-evaluation

    cleanup:
    - script:
        content: |
          helm uninstall ark-tenant --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
