apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: query-input-types
spec:
  description: Test query with user input type
  steps:
  - name: test-query-converstation-input-default
    try:
    - script:
        skipLogOutput: true
        content: |
          set -u
          echo "{\"token\": \"$E2E_TEST_AZURE_OPENAI_KEY\", \"url\": \"$E2E_TEST_AZURE_OPENAI_BASE_URL\"}"
        outputs:
        - name: azure
          value: (json_parse($stdout))
    - apply:
        file: manifests/a01-secret.yaml
    - apply:
        file: manifests/a02-model.yaml
    - apply:
        file: manifests/a03-agent.yaml
    - apply:
        file: manifests/query-input-type-default.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Model
          metadata:
            name: test-model
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: test-agent
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-input-default
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: test-query-input-default
          status:
            (response != null): true
            (response.target.name): 'test-agent'
            (length(response.content) > `10`): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-input-default
