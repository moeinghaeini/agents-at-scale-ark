apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: model-token-usage
spec:
  description: Test query token usage tracking for direct model targets
  steps:
  - name: setup-resources
    try:
    - script:
        skipLogOutput: true
        content: |
          set -u
          echo "{\"token\": \"$E2E_TEST_AZURE_OPENAI_KEY\", \"url\": \"$E2E_TEST_AZURE_OPENAI_BASE_URL\"}"
        outputs:
        - name: azure
          value: (json_parse($stdout))
    - script:
        content: |
          helm install ark-tenant ../../charts/ark-tenant --namespace $NAMESPACE --create-namespace --wait
        env:
        - name: NAMESPACE
          value: ($namespace)
    - apply:
        file: manifests/*.yaml

  - name: wait-for-model-ready
    try:
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: model-token-test
        timeout: 3m
        for:
          condition:
            name: ModelAvailable
            value: 'True' 

  - name: wait-for-query-completion
    try:
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: model-token-query
          status:
            phase: done

  - name: validate-model-response
    try:
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: model-token-query
          status:
            (response != null): true
            (response.target.type): model
            (response.target.name): model-token-test
            (length(response.content) > `100`): true

  - name: validate-model-token-usage
    try:
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: model-token-query
          status:
            (tokenUsage.completionTokens > `50`): true
            (tokenUsage.promptTokens > `50`): true
            (tokenUsage.totalTokens > `150`): true
            (tokenUsage.promptTokens + tokenUsage.completionTokens == to_number(tokenUsage.totalTokens)): true
    catch:
      - events: {}

    cleanup:
    - script:
        content: |
          helm uninstall ark-tenant --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
