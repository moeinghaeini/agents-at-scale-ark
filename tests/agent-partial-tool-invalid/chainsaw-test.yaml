apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: agent-partial-tool-invalid
spec:
  description: Test agent with an invalid partial tool reference should have Available=False
  steps:
    - name: setup-mock-service
      try:
        - apply:
            file: ../shared/mock-geocoding-api.yaml
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: mock-geocoding-api
              status:
                readyReplicas: 1
        - assert:
            resource:
              apiVersion: v1
              kind: Endpoints
              metadata:
                name: mock-geocoding-api
        - script:
            content: |
              kubectl wait --for=condition=ready pod -l app=mock-geocoding-api -n $NAMESPACE --timeout=60s
              MOCK_URL="http://mock-geocoding-api.$NAMESPACE.svc.cluster.local"
              kubectl run test-mock-ready --image=curlimages/curl --rm -i --restart=Never -n $NAMESPACE -- \
                curl -f -s --retry 5 --retry-connrefused --retry-delay 1 "${MOCK_URL}/v1/search?name=New+York&count=1"
            env:
              - name: NAMESPACE
                value: ($namespace)
            timeout: 60s
        - script:
            content: |
              helm install mock-llm oci://ghcr.io/dwmkerr/charts/mock-llm \
                --version 0.1.28 \
                --namespace $NAMESPACE \
                --values mock-llm-values.yaml
            env:
              - name: NAMESPACE
                value: ($namespace)
        - script:
            content: |
              helm install ark-tenant ../../charts/ark-tenant --namespace $NAMESPACE --create-namespace --wait
            env:
              - name: NAMESPACE
                value: ($namespace)
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                labels:
                  app.kubernetes.io/name: mock-llm
              status:
                phase: Running
                (contains(conditions[?type == 'Ready'].status || `[]`, 'True')): true
        - wait:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Model
            name: test-model
            timeout: 3m
            for:
              condition:
                name: ModelAvailable
                value: 'True' 
      catch:
        - events: {}
        - describe:
            apiVersion: v1
            kind: Pod
            selector: app.kubernetes.io/name=mock-llm
        - describe:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Model
            name: test-model

    - name: create-invalid-agent
      try:
        - apply:
            file: manifests/*.yaml
        - assert:
            resource:
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Agent
              metadata:
                name: partial-tool-agent-invalid
              status:
                (conditions[?type == 'Available']):
                - status: 'False'
                  reason: 'ToolNotFound'
      catch:
        - events: {}
        - describe:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Agent
            name: partial-tool-agent-invalid

      cleanup:
      - script:
          content: |
            helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
            helm uninstall ark-tenant --namespace $NAMESPACE --wait --timeout=180s || true
          env:
          - name: NAMESPACE
            value: ($namespace)
