apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: team-round-robin-migration
spec:
  description: Test round-robin strategy migration to sequential via mutating webhook
  timeouts:
    apply: 30s
    assert: 60s
    exec: 120s
  steps:
  - name: setup-resources
    try:
    - script:
        content: |
          helm install mock-llm oci://ghcr.io/dwmkerr/charts/mock-llm \
            --version 0.1.28 \
            --namespace $NAMESPACE \
            --values mock-llm-values.yaml \
            --wait --timeout=120s
        env:
        - name: NAMESPACE
          value: ($namespace)
    - apply:
        file: manifests/*.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model
        timeout: 3m
        for:
          condition:
            name: ModelAvailable
            value: 'True'
    catch:
    - events: {}

  - name: assert-migration-with-turns
    try:
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Team
          metadata:
            name: team-with-turns
          spec:
            strategy: sequential
            loops: true
            maxTurns: 2
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Team
        name: team-with-turns

  - name: assert-migration-without-turns
    try:
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Team
          metadata:
            name: team-without-turns
          spec:
            strategy: sequential
            loops: false
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Team
        name: team-without-turns

  - name: wait-for-queries
    try:
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: query-with-turns
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: query-without-turns
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: query-with-turns
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: query-without-turns

  - name: validate-responses
    try:
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: query-with-turns
          status:
            (response != null): true
            (response.target.name == 'team-with-turns'): true
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: query-without-turns
          status:
            (response != null): true
            (response.target.name == 'team-without-turns'): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: query-with-turns
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: query-without-turns

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
