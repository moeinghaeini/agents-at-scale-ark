apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: evaluator-llm-test-access
rules:
- apiGroups: ["ark.mckinsey.com"]
  resources: ["models", "queries", "evaluations", "evaluators"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets", "configmaps", "events"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: evaluator-llm-test-access
subjects:
- kind: ServiceAccount
  name: ark-evaluator
  namespace: default
roleRef:
  kind: Role
  name: evaluator-llm-test-access
  apiGroup: rbac.authorization.k8s.io