apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: evaluator-selector
  labels:
    evaluated: "true"
spec:
  description: Test evaluator selector functionality for automatic query evaluation
  steps:
    - name: setup-resources
      description: Create RBAC, secret, model, and evaluator
      try:
        - script:
            skipLogOutput: true
            content: |
              set -u
              echo "{\"token\": \"$E2E_TEST_AZURE_OPENAI_KEY\", \"url\": \"$E2E_TEST_AZURE_OPENAI_BASE_URL\"}"
            outputs:
            - name: azure
              value: (json_parse($stdout))
        - script:
            content: |
              helm install ark-tenant ../../charts/ark-tenant --namespace $NAMESPACE --create-namespace --wait
            env:
            - name: NAMESPACE
              value: ($namespace)
        - script:
            content: bash ../helpers/wait-for-evaluator.sh
        - apply:
            file: manifests/a00-evaluator-llm-rbac.yaml
        - assert:
            resource:
              apiVersion: rbac.authorization.k8s.io/v1
              kind: RoleBinding
              metadata:
                name: evaluator-llm-test-access
            timeout: 15s
        - script:
            content: bash ../helpers/wait-for-rbac.sh evaluator-llm-test-access $NAMESPACE
            env:
            - name: NAMESPACE
              value: ($namespace)
            timeout: 30s
        - apply:
            file: manifests/a01-secret.yaml
        - apply:
            file: manifests/a02-model.yaml
        - wait:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Model
            name: selector-model
            timeout: 3m
            for:
              condition:
                name: ModelAvailable
                value: 'True' 
        - apply:
            file: manifests/a03-evaluator-with-selector.yaml
            timeout: 30s
        - wait:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Evaluator
            timeout: 3m
            name: production-evaluator
            for:
              jsonPath:
                path: '{.status.phase}'
                value: 'ready'

    - name: create-evaluations
      description: Create query and manual evaluation to run evaluations in parallel
      try:
        - apply:
            file: manifests/a04-query-matching.yaml
            timeout: 60s
        - apply:
            file: manifests/a06-manual-evaluation-override.yaml
        # Wait for automatic evaluation to be created
        - assert:
            resource:
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Evaluation
              metadata:
                name: production-evaluator-matching-query-eval
                labels:
                  ark.mckinsey.com/auto: "true"
            timeout: 30s
        # Assert manual evaluation exists
        - assert:
            file: manifests/a06-manual-evaluation-override.yaml
            timeout: 60s

    - name: test-non-matching-query
      description: Create query that doesn't match evaluator selector
      try:
        - apply:
            file: manifests/a05-query-non-matching.yaml
        - assert:
            file: manifests/a05-query-non-matching.yaml
            timeout: 30s
        # Verify no automatic evaluation is created
        - error:
            resource:
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Evaluation
              metadata:
                name: production-evaluator-non-matching-query-eval
            timeout: 15s

    - name: verify-evaluations
      description: Verify all evaluations have expected parameters and status
      try:
        - wait:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Evaluation
            name: production-evaluator-matching-query-eval
            timeout: 10m
            for:
              condition:
                name: Completed
                value: 'True'

        - wait:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Evaluation
            name: manual-override-evaluation
            timeout: 10m
            for:
              condition:
                name: Completed
                value: 'True'

        - assert:
            resource:
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Evaluation
              metadata:
                name: production-evaluator-matching-query-eval
              status:
                phase: done
            timeout: 30s

        - assert:
            resource:
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Evaluation
              metadata:
                name: manual-override-evaluation
                namespace: ($namespace)
              status:
                phase: done
            timeout: 30s