apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: queries
  labels:
    multi-provider: "true"
spec:
  steps:
    - name: setup-and-test
      try:
      - script:
          skipLogOutput: true
          content: |
            ../scripts/setup-model-provider.sh auto
          outputs:
          - name: provider
            value: (json_parse($stdout))
      - apply:
          resource:
            apiVersion: v1
            kind: Secret
            metadata:
              name: test-model-token
            type: Opaque
            data:
              token: (base64_encode($provider.token))
      - apply:
          file: (join('', ['manifests/a01-model-', $provider.type, '.yaml']))
      - apply:
          file: manifests/a03-agent.yaml
      - apply:
          file: manifests/a04-query.yaml
      - wait:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Model
          name: default
          timeout: 3m
          for:
            condition:
              name: ModelAvailable
              value: 'True' 
      - assert:
          resource:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Agent
            metadata:
              name: test-agent
      - wait:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          name: test-query
          timeout: 60s
          for:
            condition:
              name: Completed
              value: 'True'
      - assert:
          resource:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Query
            metadata:
              name: test-query
            status:
              (response != null): true
              (response.target.name): 'test-agent'
              (length(response.content) > `10`): true
      catch:
      - events: {}
      - describe:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          name: test-query

