apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: basic-agent
  labels:
    # LLM tests call real language model APIs
    llm: "true"
spec:
  timeouts:
    apply: 60s
    assert: 300s
    exec: 120s
  steps:
    - name: setup-model
      try:
        - script:
            content: bash ../setup/setup-${MODEL}.sh $NAMESPACE
            env:
              - name: NAMESPACE
                value: ($namespace)
        - wait:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Model
            name: test-model
            timeout: 3m
            for:
              condition:
                name: ModelAvailable
                value: 'True' 

    - name: create-agent
      try:
        - apply:
            file: manifests/agent.yaml
