apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: queries
  labels:
    llm: "true"
spec:
  timeouts:
    apply: 60s
    assert: 300s
    exec: 120s
  steps:
    - name: setup-model
      try:
        - script:
            content: bash ../setup/setup-${MODEL}.sh $NAMESPACE
            env:
              - name: NAMESPACE
                value: ($namespace)
        - wait:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Model
            name: test-model
            timeout: 3m
            for:
              condition:
                name: ModelAvailable
                value: 'True' 

    - name: create-agent-and-query
      try:
        - apply:
            file: manifests/agent.yaml
        - apply:
            file: manifests/query.yaml
        - wait:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Query
            name: test-query
            timeout: 60s
            for:
              condition:
                name: Completed
                value: 'True'
        - assert:
            resource:
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Query
              metadata:
                name: test-query
              status:
                (response != null): true
                (length(response.content) > `10`): true
      catch:
        - events: {}
        - describe:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Query
            name: test-query

