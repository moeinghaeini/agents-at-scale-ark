apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: agent-partial-tool
  labels:
    llm: "true"
spec:
  timeouts:
    apply: 60s
    assert: 300s
    exec: 120s
  steps:
    - name: setup-mock-service
      try:
        - apply:
            file: ../../shared/mock-geocoding-api.yaml
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: mock-geocoding-api
              status:
                readyReplicas: 1
        - assert:
            resource:
              apiVersion: v1
              kind: Endpoints
              metadata:
                name: mock-geocoding-api
        - script:
            content: |
              kubectl wait --for=condition=ready pod -l app=mock-geocoding-api -n $NAMESPACE --timeout=60s
              MOCK_URL="http://mock-geocoding-api.$NAMESPACE.svc.cluster.local"
              kubectl run test-mock-ready --image=curlimages/curl --rm -i --restart=Never -n $NAMESPACE -- \
                curl -f -s "${MOCK_URL}/v1/search?name=New+York&count=1"
            env:
              - name: NAMESPACE
                value: ($namespace)
            timeout: 30s
      catch:
        - events: { }

    - name: setup-model
      try:
        - script:
            content: bash ../setup/setup-${MODEL}.sh $NAMESPACE
            env:
              - name: NAMESPACE
                value: ($namespace)
        - assert:
            resource:
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Model
              metadata:
                name: test-model
              status:
                conditions:
                  - type: ModelAvailable
                    status: "True"

    - name: create-resources
      try:
        - script:
            content: |
              MOCK_URL="http://mock-geocoding-api.$NAMESPACE.svc.cluster.local"

              kubectl apply -f - <<EOF
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Tool
              metadata:
                name: get-coordinates
                namespace: $NAMESPACE
              spec:
                type: http
                description: "Returns coordinates for the given city name for testing tool targets."
                inputSchema:
                  type: object
                  properties:
                    city:
                      type: string
                      description: City name to get coordinates for
                  required: ["city"]
                http:
                  url: $MOCK_URL/v1/search?name={city}&count=1
              EOF
            env:
              - name: NAMESPACE
                value: ($namespace)
        - apply:
            file: manifests/agent.yaml
        - apply:
            file: manifests/query.yaml
        - assert:
            resource:
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Query
              metadata:
                name: partial-tool-query
              status:
                phase: done
        - assert:
            resource:
              apiVersion: ark.mckinsey.com/v1alpha1
              kind: Query
              metadata:
                name: partial-tool-query
              status:
                (response != null): true
      catch:
        - events: {}
        - describe:
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Query
            name: partial-tool-query

