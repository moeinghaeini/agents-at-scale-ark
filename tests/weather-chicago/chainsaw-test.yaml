apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: weather-chicago
spec:
  description: Test weather agent with external API tool integration
  steps:
  - name: step-1
    try:
    - script:
        skipLogOutput: true
        content: |
          set -u
          echo "{\"token\": \"$E2E_TEST_AZURE_OPENAI_KEY\", \"url\": \"$E2E_TEST_AZURE_OPENAI_BASE_URL\"}"
        outputs:
        - name: azure
          value: (json_parse($stdout))
    - apply:
        file: manifests/a00-mock-server.yaml
    - script:
        content: |
          helm install ark-tenant ../../charts/ark-tenant --namespace $NAMESPACE --create-namespace --wait
        env:
        - name: NAMESPACE
          value: ($namespace)
    - apply:
        file: manifests/a01-secret.yaml
    - apply:
        file: manifests/a02-model.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: weather-default-model
        timeout: 3m
        for:
          condition:
            name: ModelAvailable
            value: 'True' 
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: mock-weather-api
            namespace: ($namespace)
          status:
            readyReplicas: 1
            availableReplicas: 1
    # Create tools using kubectl with template substitution
    - script:
        content: |
          MOCK_URL="http://mock-weather-api.$NAMESPACE.svc.cluster.local"
          
          # Create get-coordinates tool
          kubectl apply -f - <<EOF
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Tool
          metadata:
            name: get-coordinates
            namespace: $NAMESPACE
          spec:
            type: http
            description: "Returns coordinates for the given city name."
            inputSchema:
              type: object
              properties:
                city:
                  type: string
                  description: City name to get coordinates for
              required: ["city"]
            http:
              url: $MOCK_URL/v1/search?name={city}&count=1
          EOF
          
          # Create get-forecast tool
          kubectl apply -f - <<EOF
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Tool
          metadata:
            name: get-forecast
            namespace: $NAMESPACE
          spec:
            type: http
            description: "Get weather forecast for a specific location and time period"
            inputSchema:
              type: object
              properties:
                office:
                  type: string
                  description: "Weather office identifier (e.g., TOP)"
                gridX:
                  type: integer
                  description: "Grid X coordinate"
                gridY:
                  type: integer
                  description: "Grid Y coordinate"
              required: ["office", "gridX", "gridY"]
            http:
              url: $MOCK_URL/gridpoints/{office}/{gridX},{gridY}/forecast
          EOF
    # Wait for tools to be created before patching URLs
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Tool
          metadata:
            name: get-coordinates
            namespace: ($namespace)
          status:
            state: Ready
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Tool
          metadata:
            name: get-forecast
            namespace: ($namespace)
          status:
            state: Ready
    # Wait for service endpoints to be ready
    - assert:
        resource:
          apiVersion: v1
          kind: Endpoints
          metadata:
            name: mock-weather-api
            namespace: ($namespace)
    # Test mock server connectivity 
    - script:
        content: |
          MOCK_URL="http://mock-weather-api.$NAMESPACE.svc.cluster.local"
          kubectl run test-mock-ready --image=curlimages/curl --rm -i --restart=Never -n $NAMESPACE -- \
            curl -f -s "${MOCK_URL}/v1/search?name=Chicago&count=1"
        timeout: 30s
    - apply:
        file: manifests/a05-weather-agent.yaml
    - apply:
        file: manifests/a06-chicago-query.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Agent
          metadata:
            name: chicago-weather-agent
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        timeout: 5m
        name: chicago-weather-query
        for:
          condition:
            name: Completed
            value: 'True'
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: chicago-weather-query